# ── Report Output ─────────────────────────────────────────────────────────────
reporting:
  output_dir: reports/web_vapt
  formats: [json, markdown, html, pdf, sarif, cyclonedx]
  include_evidence: true
  include_request_response: true
  include_remediation: true
  include_cwe: true
  include_owasp: true
  include_cvss: true
  include_confidence: true
  min_confidence_threshold: 0.2 # suppress findings below this confidence
  deduplicate_findings: true
  deduplication_window_seconds: 300
  report_owner: "AI Red Team"
  report_classification: "CONFIDENTIAL - Authorized Security Assessment"
  executive_summary: true
  risk_matrix: true
  timeline_events: true
  exploitability_score: true
  fix_priority: true
  false_positive_analysis: true
  severity_colors: true

  notifications:
    enabled: false
    slack_webhook: ""
    email: ""
    on_complete: true
    on_critical: true

# ── Safe Mode ────────────────────────────────────────────────────────────────
safe_mode:
  enabled: true
  skip_destructive_checks: true # never test upload/exec even if target is owned
  skip_denial_of_service: true # no DoS / resource exhaustion tests
  skip_credential_stuffing: true # no password spraying
  skip_malware_deploy: true # no malware/persistence deployment
  max_requests_per_endpoint: 100 # hard cap per endpoint
  max_requests_per_module: 500 # hard cap per module
  max_total_requests: 5000 # hard cap per scan
  skip_extensions:
    - .pdf
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .ico
    - .css
    - .woff
    - .woff2
    - .ttf
    - .eot
    - .svg
    - .mp4
    - .mp3
    - .avi
    - .mov
    - .wav
    - .flac
    - .zip
    - .tar.gz
    - .rar
    - .7z

# ── AI / ML Integration ──────────────────────────────────────────────────────
ai:
  enabled: true
  model: "local"
  context_window: 8192
  detection_enhancement: true # use AI to reduce false positives
  payload_generation: true # use AI to generate context-specific payloads
  bypass_suggestion: true # suggest WAF/security bypass techniques
  report_writing: true # AI-assisted report generation
  priority_learning: true # learn what findings matter for this target
  anomaly_detection: true # detect scan interference / countermeasures

# ── WebSocket Fuzzing ────────────────────────────────────────────────────────
websocket:
  enabled: true
  max_messages_per_connection: 50
  payloads:
    - "<script>alert(1)</script>"
    - "' OR '1'='1"
    - "../../../etc/passwd"
    - "$(id)"
    - "{{7*7}}"
    - '{"__proto__":{"admin":true}}'
    - "null"
    - "undefined"
    - "{}"
    - "[]"

# ── Headless Browser (JS Rendering / DOM Fuzzing) ──────────────────────────
browser:
  enabled: true
  engine: "chromium" # chromium, firefox, webkit
  headless: true
  viewport_width: 1920
  viewport_height: 1080
  js_timeout_seconds: 10
  dom_sink_monitoring: true
  event_handler_fuzzing: true
  mutation_observer: true
  console_log_capture: true
  network_tab_capture: true

# ── HTTP/2 & HTTP/3 Fuzzing ─────────────────────────────────────────────────
http2_fuzz:
  enabled: true
  hpack_table_poisoning: true
  stream_priority_manipulation: true
  max_concurrent_streams_test: true
  server_push_test: true

http3_fuzz:
  enabled: true
  quic_version_downgrade: true
  stream_cancellation_flood: true
  0rtt_replay_test: true
  connection_migration_test: true
  transport_parameter_manipulation: true

# ── OOB (Out-of-Band) Collaborator ──────────────────────────────────────────
oob:
  enabled: true
  collaborator_url: "http://collab.lab.local"
  dns_callback_domain: "dns.lab.local"
  callback_endpoint: "/oob/callback"
  poll_interval_seconds: 2
  max_wait_seconds: 30
  protocols: ["dns", "http", "https", "ldap", "smb"]

# ── YARA / Pattern Matching ─────────────────────────────────────────────────
yara:
  enabled: true
  rule_paths:
    - "rules/web_vulnerabilities.yara"
    - "rules/credentials.yara"
    - "rules/secrets.yara"
  scan_responses: true
  scan_source_code: true

# ── Global Filters ──────────────────────────────────────────────────────────
filters:
  exclude_status_codes:
    - 404
    - 410
  exclude_content_types:
    - "image/*"
    - "font/*"
    - "audio/*"
    - "video/*"
  exclude_url_patterns:
    - "*/logout"
    - "*/signout"
    - "*/assets/*"
    - "*/static/*"
  include_url_patterns: [] # empty = include all
  max_response_body_bytes: 1048576 # 1MB max to avoid OOM

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "info" # debug, info, warn, error
  format: "json" # json, text
  output: "stdout" # stdout, file
  file: "logs/vapt.log"
  verbose: false
  debug_payloads: false # log every payload sent (warning: large)
  request_log: "logs/requests.jsonl"
  response_log: "logs/responses.jsonl"
  error_log: "logs/errors.log"

# ── Health Check ────────────────────────────────────────────────────────────
health_check:
  enabled: true
  ping_endpoint: "/health"
  expected_status: 200
  timeout_seconds: 5
  retry_count: 3
  retry_delay_seconds: 2
